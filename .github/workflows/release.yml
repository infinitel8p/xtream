name: Release

# Triggers:
#  - push a tag like `v0.4.1`           -> full release build for that tag
#      git tag v0.4.1 && git push origin v0.4.1
#  - run "Release" from the Actions tab -> uses the version in package.json
#      as the tag (e.g. v0.4.1) and creates it from the chosen branch's HEAD
#
# The release body is auto-generated from commits + merged PRs since the
# previous tag (GitHub's "generate release notes" API), so you do NOT need
# to use annotated tags or PRs for everything.
#
# Required repo secrets / variables (Settings -> Secrets and variables -> Actions):
#  TAURI_SIGNING_PRIVATE_KEY            RAW contents of ~/.tauri/<your-key>.key
#                                       (the file is already base64-encoded by
#                                       `tauri signer generate` -- do NOT base64 it again,
#                                       or you get "Missing encoded key in secret key").
#                                       On macOS: `pbcopy < ~/.tauri/<your-key>.key`
#  TAURI_SIGNING_PRIVATE_KEY_PASSWORD   the passphrase set during keygen (empty if none)
#  ANDROID_KEYSTORE_BASE64              base64 of upload-keystore.jks
#                                       On macOS: `base64 -i upload-keystore.jks | pbcopy`
#  ANDROID_KEYSTORE_PASSWORD            store password
#  ANDROID_KEY_ALIAS                    e.g. "upload"
#  ANDROID_KEY_PASSWORD                 key password (often same as store)
#
# Outputs (attached to the GitHub Release):
#  Windows      *-setup.exe + .sig (NSIS), latest.json (auto-generated by tauri-action)
#  macOS        *.dmg, *.app.tar.gz + .sig (universal binary)
#  Linux        *.AppImage + .sig, *.deb
#  Android      *-universal-release.apk, *-universal-release.aab (signed)
#
# MSIX / Microsoft Store packaging is intentionally not included here. See
# `cmds.md` for the manual flow until we wire it up in a separate workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Find the most recent tag that isn't the one we're creating, so we
          # can summarise commits since then. Empty if this is the first tag.
          PREV=$(git tag --sort=-creatordate \
            | grep -v "^${TAG}$" \
            | head -n1 || true)
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"

      - id: gather
        shell: bash
        env:
          PREV_TAG: ${{ steps.meta.outputs.prev_tag }}
        run: |
          set -euo pipefail
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            HEADER="Commits since ${PREV_TAG}"
          else
            RANGE=""
            HEADER="All commits (no previous tag)"
          fi
          {
            echo "## $HEADER"
            echo
            git log --no-merges --pretty=format:'- %s (%h) by %an' $RANGE
            echo
            echo
            echo "## File change summary"
            echo
            git diff --stat $RANGE | tail -n 200
          } > "$RUNNER_TEMP/changes.md"
          # Cap the payload so we never blow past the model's context window.
          head -c 16000 "$RUNNER_TEMP/changes.md" > "$RUNNER_TEMP/changes.trimmed.md"
          {
            echo 'log<<CHANGES_EOF'
            cat "$RUNNER_TEMP/changes.trimmed.md"
            echo 'CHANGES_EOF'
          } >> "$GITHUB_OUTPUT"

      - id: ai
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          max-tokens: 1200
          system-prompt: |
            You write user-facing release notes for "Extreme InfiniTV", an IPTV
            player built with Astro + Svelte 5 and Tauri 2 (Windows desktop,
            Microsoft Store, Android). Audience: end users, not contributors.

            Output structure (in this exact order):

            1. A single bold sentence summarising the headline change of the
               release, written as one line of markdown wrapped in `**...**`.
               It should answer "what's the most useful thing in this release
               for a user". No preamble like "In this release". Skip this line
               only if no commit is user-facing.
            2. A blank line.
            3. Section headings, each on its own line, in this exact order, omitting
               any whose bullet list would be empty:
                 ### New
                 ### Improved
                 ### Fixed
                 ### Under the hood
               Each heading is followed by one or more bullets.

            Rules:
            - Output GitHub-flavoured markdown only. No preamble before the
              summary sentence, no closing remarks after the last bullet.
            - One bullet per change. Rewrite each commit subject as a short
              user-facing sentence. Drop conventional-commit prefixes
              (feat:, fix:, chore:, refactor:, etc.).
            - Merge duplicates. Collapse multiple dependency bumps into a single
              "Updated dependencies" bullet under "Under the hood".
            - Skip purely internal noise (lockfile-only changes, CI tweaks,
              comment edits, tracking-file removals) unless they affect users.
            - Do not invent features. If the commits do not justify a heading,
              omit it.
            - No emojis anywhere - not in the summary, not in headings, not in
              bullets. Plain text only.
            - Never use em dashes. Use a regular hyphen, a colon, parentheses,
              or rewrite the sentence.
          prompt: |
            Write release notes for tag ${{ steps.meta.outputs.tag }}.

            ${{ steps.gather.outputs.log }}

      - id: create
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          AI_NOTES: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const tag = process.env.TAG
            const version = process.env.VERSION
            let changelog = (process.env.AI_NOTES || '').trim()

            if (!changelog) {
              try {
                const notes = await github.rest.repos.generateReleaseNotes({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  target_commitish: context.sha,
                })
                changelog = (notes.data.body || '').trim()
              } catch (e) {
                core.warning(`generateReleaseNotes failed: ${e.message}`)
              }
            }
            if (!changelog) {
              changelog = '_No changes detected. Edit this draft before publishing._'
            }

            let summary = ''
            const lines = changelog.split('\n')
            const summaryMatch = lines[0]?.trim().match(/^\*\*(.+)\*\*\s*$/)
            if (summaryMatch) {
              summary = `<strong>${summaryMatch[1]}</strong>`
              let i = 1
              while (i < lines.length && lines[i].trim() === '') i++
              changelog = lines.slice(i).join('\n').trim()
            }

            const downloads = [
              '## Downloads',
              '',
              'Pick the file that matches your device. The Microsoft Store and Google Play buttons below are the easiest path on Windows and Android.',
              '',
              '| Platform | File |',
              '|----------|------|',
              `| Windows 10/11 (recommended installer) | \`xtream_${version}_x64-setup.exe\` |`,
              `| Windows (MSI alternative) | \`xtream_${version}_x64_en-US.msi\` |`,
              `| macOS (Apple Silicon + Intel) | \`xtream_${version}_universal.dmg\` |`,
              `| Linux Debian / Ubuntu / Mint | \`xtream_${version}_amd64.deb\` |`,
              `| Linux Fedora / openSUSE / RHEL | \`xtream-${version}-1.x86_64.rpm\` |`,
              `| Linux portable (any distro) | \`xtream_${version}_amd64.AppImage\` |`,
              `| Android sideload (APK) | \`xtream_${version}.apk\` |`,
              '',
              '<details><summary>What about the <code>.sig</code> files, <code>latest.json</code> and the macOS <code>.app.tar.gz</code>?</summary>',
              '',
              'You can ignore them.',
              '',
              '- `*.sig` and `latest.json` are used by the built-in auto-updater to verify each download is genuinely signed. The app downloads them on its own when checking for updates.',
              '- `xtream_universal.app.tar.gz` is the macOS update bundle consumed by the same updater. For a fresh install on macOS, use the `.dmg` instead.',
              '- The `.aab` file is uploaded to Google Play and is not meant for sideloading. Use the `.apk` to install manually.',
              '',
              '</details>',
              '',
              '<details><summary>macOS: "xtream.app" cannot be opened / "Apple could not verify..."</summary>',
              '',
              'The macOS build is not yet notarized by Apple, so Gatekeeper blocks it on first launch. After dragging the app from the `.dmg` into `/Applications`, remove the quarantine flag from a Terminal:',
              '',
              '```bash',
              'xattr -dr com.apple.quarantine /Applications/xtream.app',
              '```',
              '',
              'Then open the app normally. You only need to do this once per install.',
              '',
              '</details>',
            ].join('\n')

            const body = [
              '<p align="center">',
              '  <img src="https://raw.githubusercontent.com/infinitel8p/xtream/refs/heads/main/src-tauri/icons/128x128@2x.png" alt="App Icon"/>',
              '</p>',
              '',
              ...(summary ? [`<p align="center">${summary}</p>`, ''] : []),
              `## Changelog ${tag}`,
              changelog,
              '',
              downloads,
              '',
              '<a href="https://play.google.com/store/apps/details?id=com.infinitel8p.xtream">',
              '<img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" height="60"/>',
              '</a>',
              '',
              '[![Get it from Microsoft](https://get.microsoft.com/images/en-us%20dark.svg)](https://apps.microsoft.com/store/detail/9NN162Z0WXSR)',
            ].join('\n')

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Extreme InfiniTV ${tag}`,
              body,
              draft: true,
              prerelease: false,
              target_commitish: context.sha,
            })
            return data.id
          result-encoding: string

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            rust-targets: ""
          - os: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - os: ubuntu-22.04
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.os }}

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0 ndk;26.1.10909125"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: android

      - run: pnpm install --frozen-lockfile

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty"
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "XTREAM_KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build signed AAB
        env:
          XTREAM_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          XTREAM_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          XTREAM_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: pnpm tauri android build --aab

      - name: Build signed APK (universal)
        env:
          XTREAM_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          XTREAM_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          XTREAM_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: pnpm tauri android build --apk

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/android-out"
          mkdir -p "$OUT"
          VERSION=$(node -p "require('./package.json').version")
          # Tauri's android build drops AABs/APKs under
          # src-tauri/gen/android/app/build/outputs/{bundle,apk}/...
          AAB=$(find src-tauri/gen/android/app/build/outputs/bundle -name "*release*.aab" | head -1)
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*release*.apk" | head -1)
          if [ -z "$AAB" ] || [ -z "$APK" ]; then
            echo "::error::Could not locate signed AAB/APK after build"
            find src-tauri/gen/android/app/build/outputs -type f
            exit 1
          fi
          cp "$AAB" "$OUT/xtream_${VERSION}.aab"
          cp "$APK" "$OUT/xtream_${VERSION}.apk"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release view ${{ needs.create-release.outputs.release_id }} --json tagName -q .tagName 2>/dev/null \
            || gh api repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} --jq .tag_name)
          gh release upload "$TAG" \
            "${{ steps.collect.outputs.out }}/"*.aab \
            "${{ steps.collect.outputs.out }}/"*.apk \
            --clobber

