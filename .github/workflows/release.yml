name: Release

# Triggers:
#  - push a tag like `v0.4.1`           -> full release build for that tag
#      git tag v0.4.1 && git push origin v0.4.1
#  - run "Release" from the Actions tab -> uses the version in package.json
#      as the tag (e.g. v0.4.1) and creates it from the chosen branch's HEAD
#
# The release body is auto-generated from commits + merged PRs since the
# previous tag (GitHub's "generate release notes" API), so you do NOT need
# to use annotated tags or PRs for everything.
#
# Required repo secrets / variables (Settings -> Secrets and variables -> Actions):
#  TAURI_SIGNING_PRIVATE_KEY            RAW contents of ~/.tauri/<your-key>.key
#                                       (the file is already base64-encoded by
#                                       `tauri signer generate` -- do NOT base64 it again,
#                                       or you get "Missing encoded key in secret key").
#                                       On macOS: `pbcopy < ~/.tauri/<your-key>.key`
#  TAURI_SIGNING_PRIVATE_KEY_PASSWORD   the passphrase set during keygen (empty if none)
#  ANDROID_KEYSTORE_BASE64              base64 of upload-keystore.jks
#                                       On macOS: `base64 -i upload-keystore.jks | pbcopy`
#  ANDROID_KEYSTORE_PASSWORD            store password
#  ANDROID_KEY_ALIAS                    e.g. "upload"
#  ANDROID_KEY_PASSWORD                 key password (often same as store)
#
# Outputs (attached to the GitHub Release):
#  Windows      *-setup.exe + .sig (NSIS), latest.json (auto-generated by tauri-action)
#  macOS        *.dmg, *.app.tar.gz + .sig (universal binary)
#  Linux        *.AppImage + .sig, *.deb
#  Android      *-universal-release.apk, *-universal-release.aab (signed)
#
# MSIX / Microsoft Store packaging is intentionally not included here. See
# `cmds.md` for the manual flow until we wire it up in a separate workflow.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      models: read
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      tag: ${{ steps.meta.outputs.tag }}
      updater_notes: ${{ steps.create.outputs.updater_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${VERSION}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Find the most recent tag that isn't the one we're creating, so we
          # can summarise commits since then. Empty if this is the first tag.
          PREV=$(git tag --sort=-creatordate \
            | grep -v "^${TAG}$" \
            | head -n1 || true)
          echo "prev_tag=$PREV" >> "$GITHUB_OUTPUT"

      - id: gather
        shell: bash
        env:
          PREV_TAG: ${{ steps.meta.outputs.prev_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            HEADER="Commits since ${PREV_TAG}"
            PREV_DATE=$(git log -1 --format=%cI "$PREV_TAG" || echo "")
          else
            RANGE=""
            HEADER="All commits (no previous tag)"
            PREV_DATE=""
          fi
          # Order matters: with the 24 KB trim below, content earlier in this
          # block is more likely to survive truncation. Order from highest to
          # lowest signal:
          #   1. Compact commit subjects (always fits, gives the model an index)
          #   2. Merged PR descriptions (canonical "what shipped" for release
          #      branches - usually the most valuable single source)
          #   3. Commit details with bodies (richer fallback)
          #   4. File change summary (noise; lowest priority)
          {
            echo "## $HEADER"
            echo
            echo "### Commit subjects"
            echo
            git log --no-merges --pretty=format:'- %s (%h) by %an' $RANGE
            echo
            echo
            if [ -n "$PREV_DATE" ]; then
              echo "### Merged PR descriptions"
              echo
              gh pr list \
                --state merged \
                --base main \
                --limit 50 \
                --search "merged:>$PREV_DATE" \
                --json number,title,body,mergedAt \
                --jq '.[] | "#### #\(.number): \(.title)\n\nMerged: \(.mergedAt)\n\n\(.body)\n\n---\n"' \
                || echo "(no merged PRs found)"
              echo
            fi
            echo "### Commit details (subject + body)"
            echo
            git log --no-merges --pretty=format:'#### %s (%h)%n%n%b%n---%n' $RANGE
            echo
            echo "### File change summary"
            echo
            git diff --stat $RANGE | tail -n 200
          } > "$RUNNER_TEMP/changes.md"
          # GitHub Models on Copilot Pro caps gpt-4o at 8000 input tokens per
          # request (rate-limit tier "Low"). With the system prompt eating
          # ~800 tokens, we have ~7000 tokens for content - roughly 24 KB of
          # ASCII text. Trim aggressively from the front of the file so the
          # most important section (PR descriptions, when present) is most
          # likely to fit; the gather step ordered them with PR descriptions
          # first when available.
          head -c 24000 "$RUNNER_TEMP/changes.md" > "$RUNNER_TEMP/changes.trimmed.md"
          {
            echo 'log<<CHANGES_EOF'
            cat "$RUNNER_TEMP/changes.trimmed.md"
            echo 'CHANGES_EOF'
          } >> "$GITHUB_OUTPUT"

      - id: ai
        continue-on-error: true
        uses: actions/ai-inference@v1
        with:
          # On Copilot Pro, gpt-4o is the strongest practical model for this
          # task because it has the largest input window (8000 tokens). The
          # newer reasoning-tier models (gpt-5, gpt-5-mini, o4-mini) are
          # capped at 4000 input tokens which is too tight for the PR-body +
          # commit-body payload below. Don't "upgrade" to gpt-5 without first
          # cutting the input cap in half.
          # See https://docs.github.com/en/github-models/use-github-models/prototyping-with-ai-models#rate-limits
          model: openai/gpt-4o
          max-tokens: 4000
          system-prompt: |
            You write user-facing release notes for "Extreme InfiniTV", an IPTV
            player built with Astro + Svelte 5 and Tauri 2. It ships on
            Windows desktop (NSIS + Microsoft Store), Android phone / tablet /
            TV (Google Play + APK), macOS, Linux, and the web. Audience: end
            users, not contributors.

            You are given three sources of truth, in priority order:
              1. Merged PR descriptions - the most reliable "what shipped".
                 When present, treat them as the primary source.
              2. Commit details (subject + body) - bodies often list multiple
                 user-visible features under one subject.
              3. Commit subjects - the weakest source; use only for filling in
                 minor changes the PR descriptions don't cover.

            Output structure (in this exact order):

            1. A single bold sentence summarising the headline change of the
               release, written as one line of markdown wrapped in `**...**`.
               It should answer "what's the most useful thing in this release
               for a user". No preamble like "In this release". Skip this line
               only if no commit is user-facing.
            2. If the release contains a breaking change, rename, or anything
               existing users need to know about *before* updating, add a
               `## Heads up` section directly after the summary explaining what
               changes for them. Skip this section if there is no breaking change.
            3. A blank line.
            4. Section headings, each on its own line, in this exact order,
               omitting any whose bullet list would be empty:
                 ### New
                 ### Improved
                 ### Fixed
                 ### Under the hood
               Each heading is followed by one or more bullets.

            Rules:
            - Output GitHub-flavoured markdown only. No preamble before the
              summary, no closing remarks after the last bullet.
            - A single commit or PR can produce multiple bullets when it
              touches multiple user-visible features. Don't compress unrelated
              features into one bullet just because they share a commit.
            - Be concrete and specific. Prefer "Picture-in-Picture and a
              subtitle / audio-track picker in the movies and series player"
              over "Improved player UI". Name the feature, not the abstraction.
            - Drop conventional-commit prefixes (feat:, fix:, chore:, etc.)
              when rewriting subjects into bullets.
            - Sort bullets within each section by user impact, biggest first.
            - Merge duplicates. Collapse multiple dependency bumps into a
              single "Updated dependencies" bullet under "Under the hood",
              but only include it when commits actually exist for it - never
              invent a dependency-bump bullet to fill space.
            - Skip purely internal noise (lockfile-only changes, CI tweaks,
              comment edits, tracking-file removals, screenshot updates,
              README rewrites that don't change behaviour) unless they affect
              users.
            - Do not invent features. If the sources do not justify a heading
              or a bullet, omit it.
            - Don't write meta-bullets like "Various improvements" or
              "Several bug fixes". Be specific or omit.
            - No emojis anywhere - not in the summary, not in headings, not in
              bullets. Plain text only.
            - Never use em dashes. Use a regular hyphen, a colon, parentheses,
              or rewrite the sentence.
          prompt: |
            Write release notes for tag ${{ steps.meta.outputs.tag }}.

            ${{ steps.gather.outputs.log }}

      - id: create
        uses: actions/github-script@v7
        env:
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
          AI_NOTES: ${{ steps.ai.outputs.response }}
        with:
          script: |
            const tag = process.env.TAG
            const version = process.env.VERSION
            let changelog = (process.env.AI_NOTES || '').trim()

            if (!changelog) {
              try {
                const notes = await github.rest.repos.generateReleaseNotes({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  target_commitish: context.sha,
                })
                changelog = (notes.data.body || '').trim()
              } catch (e) {
                core.warning(`generateReleaseNotes failed: ${e.message}`)
              }
            }
            if (!changelog) {
              changelog = '_No changes detected. Edit this draft before publishing._'
            }

            let summary = ''
            let updaterNotes = ''
            const lines = changelog.split('\n')
            const summaryMatch = lines[0]?.trim().match(/^\*\*(.+)\*\*\s*$/)
            if (summaryMatch) {
              summary = `<strong>${summaryMatch[1]}</strong>`
              updaterNotes = summaryMatch[1].trim()
              let i = 1
              while (i < lines.length && lines[i].trim() === '') i++
              changelog = lines.slice(i).join('\n').trim()
            }
            // Fall back to the tag if the AI step skipped or failed - the
            // in-app updater dialog should never show an empty notes field.
            if (!updaterNotes) {
              updaterNotes = `${tag} - see the GitHub release for details.`
            }
            core.setOutput('updater_notes', updaterNotes)

            // GitHub asset URLs replace spaces in the original filename with
            // dots when serving the file. Wrap each row's filename in a
            // markdown link so users can click through directly without
            // scrolling to the Assets section at the bottom.
            const repoUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}`
            const fileLink = (filename) => {
              const slug = filename.replace(/ /g, '.')
              return `[\`${filename}\`](${repoUrl}/releases/download/${tag}/${slug})`
            }
            const downloads = [
              '## Downloads',
              '',
              'Pick the file that matches your device. Click a filename to download it directly. The Microsoft Store and Google Play buttons below are the easiest path on Windows and Android.',
              '',
              '| Platform | File |',
              '|----------|------|',
              `| Windows 10/11 (recommended installer) | ${fileLink(`Extreme InfiniTV_${version}_x64-setup.exe`)} |`,
              `| Windows (MSI alternative) | ${fileLink(`Extreme InfiniTV_${version}_x64_en-US.msi`)} |`,
              `| macOS (Apple Silicon + Intel) | ${fileLink(`Extreme InfiniTV_${version}_universal.dmg`)} |`,
              `| Linux Debian / Ubuntu / Mint | ${fileLink(`extreme-infinitv_${version}_amd64.deb`)} |`,
              `| Linux Fedora / openSUSE / RHEL | ${fileLink(`extreme-infinitv-${version}-1.x86_64.rpm`)} |`,
              `| Linux portable (any distro) | ${fileLink(`extreme-infinitv_${version}_amd64.AppImage`)} |`,
              `| Android sideload (APK) | ${fileLink(`Extreme InfiniTV_${version}.apk`)} |`,
              '',
              '<details><summary>What about the <code>.sig</code> files, <code>latest.json</code> and the macOS <code>.app.tar.gz</code>?</summary>',
              '',
              'You can ignore them.',
              '',
              '- `*.sig` and `latest.json` are used by the built-in auto-updater to verify each download is genuinely signed. The app downloads them on its own when checking for updates.',
              '- `Extreme InfiniTV_universal.app.tar.gz` is the macOS update bundle consumed by the same updater. For a fresh install on macOS, use the `.dmg` instead.',
              '- The `.aab` file is uploaded to Google Play and is not meant for sideloading. Use the `.apk` to install manually.',
              '',
              '</details>',
              '',
              '<details><summary>macOS: "Extreme InfiniTV.app" cannot be opened / "Apple could not verify..."</summary>',
              '',
              'The macOS build is not yet notarized by Apple, so Gatekeeper blocks it on first launch. After dragging the app from the `.dmg` into `/Applications`, remove the quarantine flag from a Terminal:',
              '',
              '```bash',
              'xattr -dr com.apple.quarantine "/Applications/Extreme InfiniTV.app"',
              '```',
              '',
              'Then open the app normally. You only need to do this once per install.',
              '',
              '</details>',
            ].join('\n')

            const body = [
              '<p align="center">',
              '  <img src="https://raw.githubusercontent.com/infinitel8p/Extreme-InfiniTV/refs/heads/main/src-tauri/icons/128x128@2x.png" alt="App Icon"/>',
              '</p>',
              '',
              ...(summary ? [`<p align="center">${summary}</p>`, ''] : []),
              `## Changelog ${tag}`,
              changelog,
              '',
              downloads,
              '',
              '<a href="https://play.google.com/store/apps/details?id=com.infinitel8p.xtream">',
              '<img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" height="60"/>',
              '</a>',
              '',
              '[![Get it from Microsoft](https://get.microsoft.com/images/en-us%20dark.svg)](https://apps.microsoft.com/store/detail/9NN162Z0WXSR)',
            ].join('\n')

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Extreme InfiniTV ${tag}`,
              body,
              draft: true,
              prerelease: false,
              target_commitish: context.sha,
            })
            return data.id
          result-encoding: string

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: ""
            rust-targets: ""
          - os: macos-latest
            args: "--target universal-apple-darwin"
            rust-targets: "aarch64-apple-darwin x86_64-apple-darwin"
          - os: ubuntu-22.04
            args: ""
            rust-targets: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.os }}

      - run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true

  build-android:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-36 build-tools;36.0.0 ndk;26.1.10909125"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: android

      - run: pnpm install --frozen-lockfile

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is empty"
            exit 1
          fi
          KEYSTORE_PATH="$RUNNER_TEMP/upload-keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
          echo "XTREAM_KEYSTORE_FILE=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: Build signed AAB
        env:
          XTREAM_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          XTREAM_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          XTREAM_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: pnpm tauri android build --aab

      - name: Build signed APK (universal)
        env:
          XTREAM_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          XTREAM_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          XTREAM_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125
        run: pnpm tauri android build --apk

      - name: Collect artifacts
        id: collect
        shell: bash
        run: |
          set -euo pipefail
          OUT="$RUNNER_TEMP/android-out"
          mkdir -p "$OUT"
          VERSION=$(node -p "require('./package.json').version")
          # Tauri's android build drops AABs/APKs under
          # src-tauri/gen/android/app/build/outputs/{bundle,apk}/...
          AAB=$(find src-tauri/gen/android/app/build/outputs/bundle -name "*release*.aab" | head -1)
          APK=$(find src-tauri/gen/android/app/build/outputs/apk -name "*release*.apk" | head -1)
          if [ -z "$AAB" ] || [ -z "$APK" ]; then
            echo "::error::Could not locate signed AAB/APK after build"
            find src-tauri/gen/android/app/build/outputs -type f
            exit 1
          fi
          cp "$AAB" "$OUT/Extreme InfiniTV_${VERSION}.aab"
          cp "$APK" "$OUT/Extreme InfiniTV_${VERSION}.apk"
          echo "out=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG=$(gh release view ${{ needs.create-release.outputs.release_id }} --json tagName -q .tagName 2>/dev/null \
            || gh api repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} --jq .tag_name)
          gh release upload "$TAG" \
            "${{ steps.collect.outputs.out }}/"*.aab \
            "${{ steps.collect.outputs.out }}/"*.apk \
            --clobber

  # Patch the in-app auto-updater dialog text in `latest.json`. tauri-action
  # generates this file with `notes: ""` by default, so the in-app updater
  # prompt would otherwise show an empty changelog. We download the file the
  # build job uploaded, set `notes` to the AI-generated summary line, and
  # re-upload it with --clobber.
  patch-updater-notes:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Patch latest.json notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ needs.create-release.outputs.updater_notes }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p _updater
          cd _updater
          if ! gh release download "$TAG" -p latest.json --repo "${{ github.repository }}"; then
            echo "::warning::latest.json missing on release $TAG - skipping notes patch"
            exit 0
          fi
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('latest.json', 'utf8'));
            j.notes = process.env.NOTES;
            fs.writeFileSync('latest.json', JSON.stringify(j, null, 2));
          "
          gh release upload "$TAG" latest.json --clobber --repo "${{ github.repository }}"

  # publish-release:
  #   needs: [create-release, build-tauri, build-android]
  #   runs-on: ubuntu-latest
  #   permissions:
  #     contents: write
  #   steps:
  #     - name: Un-draft the release
  #       env:
  #         GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  #       run: |
  #         gh api -X PATCH \
  #           repos/${{ github.repository }}/releases/${{ needs.create-release.outputs.release_id }} \
  #           -f draft=false
